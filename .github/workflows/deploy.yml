name: Deploy

on:
  push:
    branches:
      - temp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: manoj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          script: |
            cd /var/www/voiceofamuse.com
            git fetch origin &&
            git reset --hard origin/temp && 
            npm install && 
            npm run build &&
            pm2 restart all